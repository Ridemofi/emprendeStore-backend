    port: 587                  # Puerto estándar para TLS
    username: resend           # Siempre es "resend"
    password: ${RESEND_API_KEY} # Tu nueva API Key va aquí (en variable de entorno)
    from: onboarding@ridemofi.me # Correo de tu dominio verificado
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
