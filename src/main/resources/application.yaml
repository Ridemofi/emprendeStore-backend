spring:
  application:
    name: emprendeStore
  datasource:
    # probar en local
    url: jdbc:mysql://localhost:3307/DB_ES
    username: root
    password: mysql
    #url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?ssl-mode=REQUIRED
    #username: ridemofi
    #password: ${DB_PASSWORD}
  jpa:
    show-sql: true
